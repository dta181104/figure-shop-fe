<!-- Trang chủ Shop -->
<section class="hero">
  <picture>
    <source media="(min-width: 1024px)" srcset="assets/images/717760.jpg" />
    <source media="(min-width: 640px)" srcset="assets/images/717760.jpg" />
    <img class="hero__bg" src="assets/images/717760.jpg" alt="Gundam showcase background" />
  </picture>

  <div class="hero__overlay"></div>

  <div class="hero__content container">
    <h1 class="hero__title">FIGURE <span>SHOP</span></h1>
  </div>
</section>

<!-- Sản phẩm -->
<section class="featured container" id="products">
  <header class="section-header">
    <h2>Sản phẩm</h2>
  </header>

  <!-- Bộ lọc sản phẩm -->
  <section
    class="filters"
    style="border: 2px solid black; padding: 20px; border-radius: 8px; margin-bottom: 30px"
  >
    <form (submit)="applyFilters()" class="filter-form">
      <div class="filter-group">
        <label>Tìm kiếm</label>
        <input
          type="text"
          name="keyword"
          [(ngModel)]="params.keyword"
          placeholder="Tên sản phẩm..."
          class="form-control"
          style="border: 1px solid black"
        />
      </div>

      <div class="filter-group">
        <label>Series</label>
        <select
          name="categoryId"
          [(ngModel)]="params.categoryId"
          class="form-control"
          style="border: 1px solid black"
        >
          <option value="">Tất cả</option>
          <option *ngFor="let cat of categories" [value]="cat.id">{{ cat.name }}</option>
        </select>
      </div>

      <div class="filter-group">
        <label>Giá từ</label>
        <input
          type="number"
          name="minPrice"
          [(ngModel)]="params.minPrice"
          placeholder="0"
          class="form-control"
          style="border: 1px solid black"
        />
      </div>

      <div class="filter-group">
        <label>Đến giá</label>
        <input
          type="number"
          name="maxPrice"
          [(ngModel)]="params.maxPrice"
          placeholder="..."
          class="form-control"
          style="border: 1px solid black"
        />
      </div>

      <div class="filter-group">
        <label>Sắp xếp theo</label>
        <select
          name="sortBy"
          [(ngModel)]="params.sortBy"
          class="form-control"
          style="border: 1px solid black"
        >
          <option value="">Mặc định</option>
          <option value="NAME">Tên</option>
          <option value="PRICE">Giá</option>
          <option value="UPDATED_DATE">Ngày cập nhật</option>
          <option value="HEIGHT">Chiều cao</option>
          <option value="WEIGHT">Cân nặng</option>
        </select>
      </div>

      <div class="filter-group">
        <label>Sắp xếp</label>
        <select
          name="sortDirection"
          [(ngModel)]="params.sortDirection"
          class="form-control"
          style="border: 1px solid black"
        >
          <option value="ASC">Tăng dần</option>
          <option value="DESC">Giảm dần</option>
        </select>
      </div>

      <div class="filter-actions">
        <button type="submit" class="btn btn--primary">Tìm kiếm</button>
        <button type="button" class="btn btn--ghost" (click)="clearFilters()">Xóa bộ lọc</button>
      </div>
    </form>
  </section>

  <div
    *ngIf="products.length > 0; else noProducts"
    class="product-grid"
    style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px"
  >
    <article *ngFor="let product of products" class="product-card" (click)="viewDetail(product.id)">
      <!-- Thumbnail -->
      <div class="product-card__thumb">
        <img [src]="getMainImage(product)" [alt]="product?.name" />
      </div>

      <!-- Thông tin sản phẩm -->
      <div class="product-card__body">
        <h3
          class="product-card__title"
          style="
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
            height: 3rem;
            line-height: 1.5rem;
            margin-bottom: 8px;
          "
        >
          {{ product.name }}
        </h3>
        <div class="price">
          <span class="price__now">{{ product.price | number }} đ</span>
        </div>
        <button class="btn btn--block btn--primary" type="button">Thêm vào giỏ</button>
      </div>
    </article>
  </div>

  <ng-template #noProducts>
    <div
      style="
        text-align: center;
        padding: 4rem 1rem;
        border: 1px dashed #ccc;
        border-radius: 8px;
        margin-bottom: 2rem;
        background: #fafafa;
      "
    >
      <p style="color: #666; font-size: 1.1rem; margin: 0">
        Không có sản phẩm phù hợp tiêu chí tìm kiếm
      </p>
    </div>
  </ng-template>

  <!-- Phân trang -->
  <div class="pagination-wrapper" *ngIf="totalProducts > 0">
    <nz-pagination
      [(nzPageIndex)]="params.pageIndex"
      [nzTotal]="totalProducts"
      [nzPageSize]="params.pageSize"
      (nzPageIndexChange)="loadProducts()"
      [nzResponsive]="true"
    >
    </nz-pagination>
  </div>
</section>
