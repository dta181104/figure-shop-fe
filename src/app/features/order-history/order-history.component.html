<div class="order-history-container">
  <h1 class="page-title">Lịch sử đặt hàng</h1>

  <div class="filter-section">
    <nz-select
      style="width: 200px"
      [(ngModel)]="filterParams.status"
      (ngModelChange)="loadOrders()"
      nzAllowClear
      nzPlaceHolder="Lọc theo trạng thái"
    >
      <nz-option nzValue="PENDING" nzLabel="Chờ xác nhận"></nz-option>
      <nz-option nzValue="CONFIRMED" nzLabel="Đã xác nhận"></nz-option>
      <nz-option nzValue="SHIPPING" nzLabel="Đang giao hàng"></nz-option>
      <nz-option nzValue="DELIVERED" nzLabel="Đã giao"></nz-option>
      <nz-option nzValue="CANCELLED" nzLabel="Đã hủy"></nz-option>
    </nz-select>
  </div>

  <nz-table
    #basicTable
    [nzData]="orders"
    [nzLoading]="isLoading"
    [nzTotal]="totalOrders"
    [(nzPageIndex)]="pageIndex"
    [(nzPageSize)]="pageSize"
    [nzFrontPagination]="false"
    (nzPageIndexChange)="loadOrders()"
  >
    <thead>
      <tr>
        <th>Mã đơn hàng</th>
        <th>Ngày đặt</th>
        <th>Tổng tiền</th>
        <th>Trạng thái</th>
        <th nzRight>Thao tác</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let data of basicTable.data">
        <td>
          <strong>#{{ data.code }}</strong>
        </td>
        <td>{{ data.createdAt | date: 'dd/MM/yyyy HH:mm' }}</td>
        <td>{{ data.totalPrice | number }}đ</td>
        <td>
          <nz-tag [nzColor]="getStatusColor(data.status)">
            {{ getStatusLabel(data.status) }}
          </nz-tag>
        </td>
        <td nzRight>
          <button nz-button nzType="link" (click)="viewDetail(data)">Xem chi tiết</button>
        </td>
      </tr>
    </tbody>
  </nz-table>
</div>
