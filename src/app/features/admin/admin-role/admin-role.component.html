<div class="admin-grid">
  <div class="card">
    <div class="card-header">
      <h3>Danh sách vai trò</h3>
    </div>

    <div class="alert alert-error" *ngIf="errorMessage">{{ errorMessage }}</div>

    <nz-table
      #roleTable
      [nzData]="roles"
      [nzLoading]="isLoading"
      nzSize="middle"
      [nzFrontPagination]="true"
      [nzPageSize]="10"
    >
      <thead>
        <tr>
          <th nzWidth="60px">STT</th>
          <th>Mã vai trò</th>
          <th>Tên vai trò</th>
          <th>Trạng thái</th>
          <th nzRight>Thao tác</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let role of roleTable.data; let i = index">
          <td>{{ i + 1 }}</td>
          <td>
            <strong>{{ role.code }}</strong>
          </td>
          <td>{{ role.name || '---' }}</td>
          <td>
            <span class="badge-deleted" *ngIf="role.deleted">Đã xóa</span>
            <span *ngIf="!role.deleted" style="color: #059669; font-weight: 600">Hoạt động</span>
          </td>
          <td nzRight>
            <div class="inline-actions">
              <button class="action-btn action-edit" (click)="editRole(role)">Sửa</button>
              <button
                *ngIf="!role.deleted"
                class="action-btn action-delete"
                (click)="deleteRole(role)"
              >
                Xóa
              </button>
              <button
                *ngIf="role.deleted"
                class="action-btn action-restore"
                (click)="restoreRole(role)"
              >
                Khôi phục
              </button>
            </div>
          </td>
        </tr>
      </tbody>
    </nz-table>
  </div>

  <form class="card" (ngSubmit)="saveRole()" #roleFormElement>
    <h3>{{ editingRoleId ? 'Cập nhật vai trò' : 'Thêm vai trò mới' }}</h3>
    <label>
      <span>Mã vai trò</span>
      <input name="roleCode" [(ngModel)]="roleForm.code" required placeholder="VD: ADMIN, USER" />
    </label>
    <label>
      <span>Tên vai trò</span>
      <textarea
        name="roleName"
        [(ngModel)]="roleForm.name"
        required
        placeholder="Tên vai trò..."
      ></textarea>
    </label>
    <label>
      <span>Quyền</span>
      <nz-select
        name="rolePermissions"
        [(ngModel)]="roleForm.permissions"
        nzMode="multiple"
        nzPlaceHolder="Chọn quyền cho vai trò"
        [nzShowSearch]="true"
        [nzAllowClear]="true"
        [nzServerSearch]="false"
      >
        <nz-option *ngFor="let p of allPermissions" [nzLabel]="p.name" [nzValue]="p.id"></nz-option>
      </nz-select>
    </label>
    <div class="actions">
      <button type="submit" class="btn-primary" [disabled]="isSaving || !roleForm.code">
        {{ isSaving ? 'Đang lưu...' : 'Lưu vai trò' }}
      </button>
      <button type="button" class="btn-secondary" *ngIf="editingRoleId" (click)="resetForm()">
        Hủy
      </button>
    </div>
  </form>

  <app-confirm-dialog
    [visible]="confirmVisible"
    [title]="confirmTitle"
    [message]="confirmMessage"
    [confirmText]="confirmText"
    [variant]="confirmVariant"
    (confirm)="confirmActionNow()"
    (cancel)="closeConfirm()"
  ></app-confirm-dialog>
</div>
