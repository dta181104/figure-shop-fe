<section class="admin-page">
  <header class="admin-header">
    <div>
      <p class="eyebrow">Quản trị hệ thống</p>
    </div>
  </header>

  <div *ngIf="forbiddenMessage" class="alert alert-error">{{ forbiddenMessage }}</div>

  <ng-container *ngIf="!forbiddenMessage">
    <nav class="admin-nav" aria-label="Admin modules">
      <a
        routerLink="/admin/users"
        (click)="activeTab = 'users'"
        class="tab-btn"
        [class.active]="activeTab === 'users'"
      >
        Quản lý người dùng
      </a>
      <a
        routerLink="/admin/roles"
        (click)="activeTab = 'roles'"
        class="tab-btn"
        [class.active]="activeTab === 'roles'"
      >
        Quản lý vai trò
      </a>
      <a
        routerLink="/admin/categories"
        (click)="activeTab = 'categories'"
        class="tab-btn"
        [class.active]="activeTab === 'categories'"
      >
        Quản lý danh mục
      </a>
      <a
        routerLink="/admin/products"
        (click)="activeTab = 'products'"
        class="tab-btn"
        [class.active]="activeTab === 'products'"
      >
        Quản lý sản phẩm
      </a>
      <a
        routerLink="/admin/orders"
        (click)="activeTab = 'orders'"
        class="tab-btn"
        [class.active]="activeTab === 'orders'"
      >
        Quản lý đơn hàng
      </a>
      <a
        routerLink="/admin/dashboard"
        (click)="activeTab = 'dashboard'"
        class="tab-btn"
        [class.active]="activeTab === 'dashboard'"
      >
        Dashboard
      </a>
    </nav>

    <div class="admin-content-area">
      <app-admin-user *ngIf="activeTab === 'users'"></app-admin-user>
      <app-admin-product *ngIf="activeTab === 'products'"></app-admin-product>
      <app-admin-category *ngIf="activeTab === 'categories'"></app-admin-category>
      <app-admin-role *ngIf="activeTab === 'roles'"></app-admin-role>
      <app-admin-order *ngIf="activeTab === 'orders'"></app-admin-order>
      <app-admin-dashboard *ngIf="activeTab === 'dashboard'"></app-admin-dashboard>
    </div>
  </ng-container>
</section>
